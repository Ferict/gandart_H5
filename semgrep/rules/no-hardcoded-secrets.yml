rules:
  - id: no-hardcoded-secret-code
    message: '疑似硬编码 secret/token/password/private key，请改为示例占位或移到安全边界之外。'
    severity: ERROR
    languages:
      - typescript
      - javascript
      - vue
    paths:
      include:
        - /src/**/*.ts
        - /src/**/*.js
        - /src/**/*.vue
        - /scripts/**/*.ts
        - /scripts/**/*.js
        - /scripts/**/*.mjs
        - /.eslintrc.cjs
        - /.stylelintrc.cjs
        - /.textlintrc.cjs
        - /commitlint.config.cjs
        - /playwright.config.ts
        - /shims-uni.d.ts
        - /vite.config.ts
        - /vitest.config.ts
      exclude:
        - /src/mocks/**
        - /src/**/__mocks__/**
        - /src/**/*.mock.*
        - /src/utils/safeLogger.util.ts
        - /tests/**
    patterns:
      - pattern-either:
          - pattern: const $KEY = $VALUE
          - pattern: let $KEY = $VALUE
          - pattern: var $KEY = $VALUE
          - pattern: $KEY = $VALUE
          - pattern: |
              {
                ...
                $KEY: $VALUE,
                ...
              }
      - metavariable-regex:
          metavariable: $KEY
          regex: (?i).*(accessToken|refreshToken|apiKey|clientSecret|privateKey|password|secret|token).*
      - metavariable-regex:
          metavariable: $VALUE
          regex: (?i)["'](?!example["']|sample["']|placeholder["']|replace[-_ ]?me["']|changeme["']|mock["']|dummy["']|test["']|todo["']|redacted["']|your[_-]?(?:token|secret|password|key)["'])[^"'\\r\\n]{8,}["']

  - id: no-hardcoded-secret-config
    message: '疑似在根配置中写入了硬编码 secret/token/password/private key。'
    severity: ERROR
    languages:
      - generic
    paths:
      include:
        - /.editorconfig
        - /.prettierrc.json
        - /.vale.ini
        - /index.html
        - /knip.json
        - /lefthook.yml
        - /package.json
        - /tsconfig.json
      exclude:
        - /tests/**
    patterns:
      - pattern-regex: "(?i)(?:access[_-]?token|refresh[_-]?token|api[_-]?key|client[_-]?secret|private[_-]?key|password|secret|token)\\s*[\"']?\\s*[:=]\\s*[\"'][^\"'\\\\r\\\\n]{8,}[\"']"
      - pattern-not-regex: '(?i)["''](?:example|sample|placeholder|replace[-_ ]?me|changeme|mock|dummy|test|todo|redacted|your[_-]?(?:token|secret|password|key))["'']'

  - id: no-private-key-block
    message: '禁止提交私钥内容块。'
    severity: ERROR
    languages:
      - generic
    paths:
      include:
        - /src/**/*.ts
        - /src/**/*.js
        - /src/**/*.vue
        - /scripts/**/*.ts
        - /scripts/**/*.js
        - /scripts/**/*.mjs
        - /.editorconfig
        - /.eslintrc.cjs
        - /.prettierrc.json
        - /.stylelintrc.cjs
        - /.textlintrc.cjs
        - /.vale.ini
        - /commitlint.config.cjs
        - /index.html
        - /knip.json
        - /lefthook.yml
        - /package.json
        - /playwright.config.ts
        - /shims-uni.d.ts
        - /tsconfig.json
        - /vite.config.ts
        - /vitest.config.ts
      exclude:
        - /src/mocks/**
        - /src/**/__mocks__/**
        - /src/**/*.mock.*
        - /tests/**
    pattern-regex: '-----BEGIN(?: [A-Z0-9]+)? PRIVATE KEY-----'
