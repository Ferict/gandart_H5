rules:
  - id: no-v-html-directive
    message: '禁止直接使用 v-html 注入不可信 HTML，请改用安全边界处理后再展示。'
    severity: ERROR
    languages:
      - generic
    paths:
      include:
        - /src/**/*.vue
    pattern-regex: "\\bv-html\\s*="

  - id: no-unsafe-dom-html-api
    message: '禁止直接使用 innerHTML / outerHTML / document.write 注入页面结构。'
    severity: ERROR
    languages:
      - typescript
      - javascript
      - vue
    paths:
      include:
        - /src/**/*.ts
        - /src/**/*.js
        - /src/**/*.vue
        - /scripts/**/*.ts
        - /scripts/**/*.js
        - /scripts/**/*.mjs
        - /vite.config.ts
      exclude:
        - /src/mocks/**
        - /src/**/__mocks__/**
        - /src/**/*.mock.*
        - /tests/**
    pattern-either:
      - pattern: $TARGET.innerHTML = $VALUE
      - pattern: $TARGET.outerHTML = $VALUE
      - pattern: document.write(...)
