rules:
  - id: no-page-storage-api
    message: 页面层和组件层禁止直接读写本地缓存，请改走 service/store 边界。
    severity: ERROR
    languages:
      - typescript
      - vue
    paths:
      include:
        - /src/pages/**/*.vue
        - /src/pages/**/*.ts
        - /src/components/**/*.vue
        - /src/components/**/*.ts
    pattern-either:
      - pattern: uni.setStorageSync(...)
      - pattern: uni.getStorageSync(...)
      - pattern: uni.removeStorageSync(...)
      - pattern: localStorage.$METHOD(...)
