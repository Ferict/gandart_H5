rules:
  - id: no-direct-console-error
    message: 业务代码禁止直接调用 console.error，请改用 logSafeError 统一脱敏输出。
    severity: ERROR
    languages:
      - typescript
      - vue
    paths:
      include:
        - /src/**/*.ts
        - /src/**/*.vue
      exclude:
        - /src/utils/safeLogger.util.ts
    pattern: console.error(...)
