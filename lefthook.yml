commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "**/*.{ts,vue,scss,css,json,js,html,cjs,mjs,md,yml,yaml}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    eslint:
      glob: "**/*.{ts,vue}"
      run: npx eslint --fix --max-warnings=0 {staged_files}
      stage_fixed: true
    stylelint:
      glob: "**/*.{vue,scss,css}"
      run: npx stylelint --fix --allow-empty-input {staged_files}
      stage_fixed: true
    textlint:
      glob: "**/*.md"
      run: npx textlint {staged_files}

pre-push:
  commands:
    typecheck:
      run: npm run type-check
    unit:
      run: npm run test:unit
    knip:
      run: npm run knip
