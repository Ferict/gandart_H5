name: quality-gate

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit

      - name: Knip
        run: npm run knip

      - name: Docs lint
        run: npm run lint:docs

      - name: External resource whitelist and SRI gate
        run: npm run lint:external-resources

      - name: Reviewdog for ESLint
        if: always() && github.event_name == 'pull_request'
        shell: bash
        run: |
          curl -sfL https://raw.githubusercontent.com/reviewdog/reviewdog/master/install.sh | sh -s -- -b ./.tools/bin
          npx eslint src --ext .ts,.vue --format rdjson --max-warnings=0 > eslint.rdjson || true
          ./.tools/bin/reviewdog -f=rdjson -name=eslint -reporter=github-pr-check -filter-mode=added -level=error < eslint.rdjson

      - name: Lint
        run: npm run lint

      - name: Dependency audit baseline
        if: always()
        run: npm run audit:deps

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
